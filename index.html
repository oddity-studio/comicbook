<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comicbook - Collectibles</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@1,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .part-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .part-section.hidden {
      display: none;
    }

    .head-caption {
      position: relative;
      font-family: 'Exo 2', sans-serif;
      font-size: 36px;
      font-weight: 800;
      font-style: italic;
      letter-spacing: 4px;
      background: linear-gradient(180deg, #f5f7fa 0%, #6a7a8a 50%, #f5f7fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(2px 2px 0 #4a5a6a) drop-shadow(4px 4px 3px rgba(0,0,0,0.3));
    }

    .part-name {
      font-size: 18px;
      font-weight: bold;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 4px;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    }

    .part-separator {
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg, transparent, #e94560, transparent);
      position: relative;
      margin: 20px 0;
    }

    .part-separator::before {
      content: '✦';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a2e;
      padding: 0 15px;
      color: #e94560;
      font-size: 20px;
    }

    .progress-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .progress-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      background: linear-gradient(145deg, #5a5a7a, #3a3a50);
      border-radius: 12px;
      padding: 12px;
      position: relative;
      overflow: hidden;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 
        0 6px 0 #1a1a2a,
        0 8px 10px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -1px 0 rgba(0,0,0,0.3);
      border: 1px solid #6a6a8a;
    }

    .progress-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
      border-radius: 12px 12px 0 0;
      pointer-events: none;
    }

    .progress-item::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: skewX(-25deg);
      transition: left 0.5s ease;
      pointer-events: none;
    }

    .progress-item:hover::after {
      left: 150%;
      transition: left 0.5s ease;
    }

    .progress-item:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 9px 0 #1a1a2a,
        0 12px 15px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.4),
        inset 0 -1px 0 rgba(0,0,0,0.3);
    }

    .progress-item:active {
      transform: translateY(3px);
      box-shadow: 
        0 3px 0 #1a1a2a,
        0 4px 5px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.1),
        inset 0 -1px 0 rgba(0,0,0,0.4);
    }

    .page-caption {
      font-size: 16px;
      color: #aaa;
      letter-spacing: 2px;
      text-align: center;
      min-width: 80px;
      font-weight: bold;
    }

    .progress-caption {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
      font-weight: bold;
      z-index: 1;
    }

    .progress-header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .portrait {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #2d2d44;
      border: 2px solid #444;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .portrait:hover {
      transform: scale(1.1);
      border-color: #8b5cf6;
    }

    .progress-bar-container {
      flex: 1;
      height: 26px;
      background: linear-gradient(145deg, #2a2a40, #1a1a30);
      border-radius: 13px;
      overflow: hidden;
      position: relative;
      box-shadow: 
        0 3px 0 #151520,
        0 5px 6px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.2),
        inset 0 -1px 0 rgba(0,0,0,0.4);
      border: 2px solid #4a4a60;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #a78bfa);
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    .progress-text {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .play-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .play-btn:disabled {
      cursor: not-allowed;
    }

    .locked-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #444;
      color: #888;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .unlock-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .unlock-btn:hover {
      background: #a78bfa;
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 80%;
      position: relative;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 8px;
      transition: transform 0.2s ease;
      transform-origin: center center;
      cursor: zoom-in;
    }

    .lightbox-img.zoomed {
      transform: scale(2);
      cursor: zoom-out;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      z-index: 1001;
    }

    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      padding: 20px;
      user-select: none;
    }

    .lightbox-prev {
      left: 20px;
    }

    .lightbox-next {
      right: 20px;
    }

    .lightbox-prev:hover,
    .lightbox-next:hover,
    .lightbox-close:hover {
      color: #8b5cf6;
    }

    .lightbox-fillup {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      background: #8b5cf6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s ease;
      z-index: 1002;
    }

    .lightbox-fillup:hover {
      background: #a78bfa;
    }

    .lightbox-fillup.show-color:hover {
      background: #66BB6A;
    }

    .lightbox-info {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .lightbox-part {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #fff;
    }

    .lightbox-page {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container" id="container"></div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close">&times;</span>
    <span class="lightbox-prev">&#10094;</span>
    <span class="lightbox-next">&#10095;</span>
    <button class="lightbox-fillup" id="lightbox-fillup">FILL UP</button>
    <div class="lightbox-content">
      <img src="" alt="" class="lightbox-img" id="lightbox-img">
    </div>
    <div class="lightbox-info">
      <div class="lightbox-part" id="lightbox-part"></div>
      <div class="lightbox-page" id="lightbox-page"></div>
    </div>
  </div>

  <script>
    const data = {
      parts: [
        {
          order: 1,
          name: "Growing Pains",
          pages: [
            { order: 1, cap: 6, completion: 0, showColor: false },
            { order: 2, cap: 5, completion: 0, showColor: false },
            { order: 3, cap: 5, completion: 0, showColor: false },
            { order: 4, cap: 5, completion: 0, showColor: false },
            { order: 5, cap: 3, completion: 0, showColor: false }
          ]
        },
        {
          order: 2,
          name: "Ground Rules",
          locked: true,
          pages: [
            { order: 1, cap: 6, completion: 0, showColor: false },
            { order: 2, cap: 5, completion: 0, showColor: false },
            { order: 3, cap: 5, completion: 0, showColor: false },
            { order: 4, cap: 5, completion: 0, showColor: false }
          ]
        },
        {
          order: 3,
          name: "Enemy of My Enemy...",
          locked: true,
          pages: [
            { order: 1, cap: 6, completion: 0, showColor: false },
            { order: 2, cap: 5, completion: 0, showColor: false },
            { order: 3, cap: 5, completion: 0, showColor: false },
            { order: 4, cap: 5, completion: 0, showColor: false },
            { order: 5, cap: 3, completion: 0, showColor: false },
            { order: 6, cap: 6, completion: 0, showColor: false }
          ]
        }
      ]
    };

    function getPageStatus(page) {
      return page.completion >= page.cap ? 'complete' : 'incomplete';
    }

    function getPartStatus(part) {
      const completeCount = part.pages.filter(p => getPageStatus(p) === 'complete').length;
      return completeCount === part.pages.length ? 'complete' : 'incomplete';
    }

    function getPartPageCount(part) {
      return part.pages.length;
    }

    function getPartRange(part) {
      return { start: 0, end: 0 };
    }

    function render() {
      const container = document.getElementById('container');
      container.innerHTML = '';

      data.parts.forEach((part, partIndex) => {
        if (partIndex > 0) {
          const separator = document.createElement('div');
          separator.className = 'part-separator';
          container.appendChild(separator);
        }

        const partDiv = document.createElement('div');
        partDiv.className = 'part-section';
        partDiv.id = `part-${part.order}`;

        const titleContainer = document.createElement('div');
        titleContainer.style.textAlign = 'center';

        const title = document.createElement('div');
        title.className = 'head-caption';
        title.textContent = `PART ${part.order}`;
        titleContainer.appendChild(title);

        const name = document.createElement('div');
        name.className = 'part-name';
        name.textContent = part.name;
        titleContainer.appendChild(name);

        partDiv.appendChild(titleContainer);

        if (part.locked) {
          const lockedBtn = document.createElement('button');
          lockedBtn.className = 'locked-btn';
          lockedBtn.id = `unlock-btn-${part.order}`;
          lockedBtn.textContent = 'LOCKED';
          lockedBtn.disabled = true;
          partDiv.appendChild(lockedBtn);
        } else {
          const progressList = document.createElement('div');
          progressList.className = 'progress-list';

          part.pages.forEach((page, pageIndex) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'progress-item';

            const progressHeader = document.createElement('div');
            progressHeader.className = 'progress-header';

            const img = document.createElement('img');
            img.className = 'portrait';
            img.id = `page-img-${partIndex}-${pageIndex}`;
            const iconSrc = page.completion >= page.cap 
              ? `public/Page${page.order}-icon-full.webp` 
              : `public/Page${page.order}-icon.webp`;
            img.src = iconSrc;
            img.alt = '';
            img.dataset.partIndex = partIndex;
            img.dataset.pageIndex = pageIndex;
            img.dataset.part = `PART ${part.order}`;
            img.dataset.page = `Page ${page.order}`;
            img.dataset.pageNum = page.order;
            img.dataset.current = page.completion;
            img.dataset.max = page.cap;
            progressHeader.appendChild(img);

            const barContainer = document.createElement('div');
            barContainer.className = 'progress-bar-container';
            barContainer.style.flex = '1';

            const barCaption = document.createElement('span');
            barCaption.className = 'progress-caption';
            barCaption.textContent = `PAGE ${page.order}`;
            barContainer.appendChild(barCaption);

            const bar = document.createElement('div');
            bar.className = 'progress-bar';
            const percent = page.cap > 0 ? (page.completion / page.cap) * 100 : 0;
            bar.style.width = `${percent}%`;
            barContainer.appendChild(bar);

            const text = document.createElement('span');
            text.className = 'progress-text';
            text.id = `page-text-${partIndex}-${pageIndex}`;
            text.textContent = `${page.completion}/${page.cap}`;
            barContainer.appendChild(text);

            progressHeader.appendChild(barContainer);
            pageDiv.appendChild(progressHeader);
            pageDiv.dataset.partIndex = partIndex;
            pageDiv.dataset.pageIndex = pageIndex;
            progressList.appendChild(pageDiv);
          });

          partDiv.appendChild(progressList);

          const partStatus = getPartStatus(part);
          if (partStatus === 'complete') {
            const playBtn = document.createElement('button');
            playBtn.className = 'play-btn';
            playBtn.disabled = true;
            playBtn.textContent = `PLAY PART ${part.order}`;
            partDiv.appendChild(playBtn);
          }
        }

        container.appendChild(partDiv);
      });

      checkUnlocks();
    }

    function checkUnlocks() {
      data.parts.forEach((part, index) => {
        if (part.locked && index > 0) {
          const prevPart = data.parts[index - 1];
          const prevStatus = getPartStatus(prevPart);

          if (prevStatus === 'complete') {
            const unlockBtn = document.getElementById(`unlock-btn-${part.order}`);
            if (unlockBtn && unlockBtn.classList.contains('locked-btn')) {
              unlockBtn.textContent = 'UNLOCK NOW';
              unlockBtn.classList.remove('locked-btn');
              unlockBtn.classList.add('unlock-btn');
              unlockBtn.disabled = false;
              unlockBtn.onclick = function() {
                part.locked = false;
                render();
              };
            }
          }
        } else if (!part.locked) {
          const partStatus = getPartStatus(part);
          const existingPlayBtn = document.querySelector(`#part-${part.order} .play-btn`);
          if (partStatus === 'complete' && !existingPlayBtn) {
            render();
          } else if (partStatus !== 'complete' && existingPlayBtn) {
            render();
          }
        }
      });
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxPart = document.getElementById('lightbox-part');
    const lightboxPage = document.getElementById('lightbox-page');
    const lightboxClose = document.querySelector('.lightbox-close');
    const lightboxPrev = document.querySelector('.lightbox-prev');
    const lightboxNext = document.querySelector('.lightbox-next');
    const lightboxFillup = document.getElementById('lightbox-fillup');

    let currentPartIndex = 0;
    let currentPageIndex = 0;
    let currentZoom = 1;
    let panX = 0;
    let panY = 0;
    const maxZoom = 2;
    const minZoom = 1;

    function openLightbox(partIndex, pageIndex) {
      currentPartIndex = partIndex;
      currentPageIndex = pageIndex;
      const page = data.parts[partIndex].pages[pageIndex];
      
      let src;
      if (page.completion >= page.cap) {
        if (page.showColor) {
          src = `public/Page${page.order}-full.webp`;
        } else {
          src = `public/Page${page.order}-${page.completion}.webp`;
        }
      } else if (page.completion > 0) {
        src = `public/Page${page.order}-${page.completion}.webp`;
      } else {
        src = `public/Page${page.order}-0.webp`;
      }
      
      lightboxImg.src = src;
      lightboxPart.textContent = `PART ${data.parts[partIndex].order}`;
      lightboxPage.textContent = `Page ${page.order}`;
      resetZoom();
      updateFillupButton();
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
    }

    function showPrev() {
      const part = data.parts[currentPartIndex];
      currentPageIndex = (currentPageIndex - 1 + part.pages.length) % part.pages.length;
      openLightbox(currentPartIndex, currentPageIndex);
    }

    function showNext() {
      const part = data.parts[currentPartIndex];
      currentPageIndex = (currentPageIndex + 1) % part.pages.length;
      openLightbox(currentPartIndex, currentPageIndex);
    }

    function updateFillupButton() {
      const page = data.parts[currentPartIndex].pages[currentPageIndex];
      const current = page.completion;
      const max = page.cap;
      const isComplete = current >= max;

      if (isComplete) {
        if (page.showColor) {
          lightboxFillup.textContent = 'SHOW LINEART';
        } else {
          lightboxFillup.textContent = 'SHOW COLOR';
        }
        lightboxFillup.style.background = '#4CAF50';
      } else {
        lightboxFillup.textContent = 'FILL UP';
        lightboxFillup.style.background = '#8b5cf6';
      }
    }

    function fillUp() {
      const page = data.parts[currentPartIndex].pages[currentPageIndex];
      const current = page.completion;
      const max = page.cap;

      if (current >= max) {
        if (page.showColor) {
          page.showColor = false;
          lightboxImg.src = `public/Page${page.order}-${current}.webp`;
        } else {
          page.showColor = true;
          lightboxImg.src = `public/Page${page.order}-full.webp`;
        }
        updateFillupButton();
        return;
      }

      page.completion++;

      const imgEl = document.getElementById(`page-img-${currentPartIndex}-${currentPageIndex}`);
      const textEl = document.getElementById(`page-text-${currentPartIndex}-${currentPageIndex}`);
      const barEl = imgEl.parentElement.querySelector('.progress-bar');

      const percent = (page.completion / max) * 100;
      barEl.style.width = `${percent}%`;
      textEl.textContent = `${page.completion}/${max}`;

      if (page.completion >= max) {
        imgEl.src = `public/Page${page.order}-icon-full.webp`;
        lightboxImg.src = `public/Page${page.order}-${page.completion}.webp`;
      } else {
        lightboxImg.src = `public/Page${page.order}-${page.completion}.webp`;
      }

      updateFillupButton();
      checkUnlocks();
    }

    function updateTransform() {
      lightboxImg.style.transform = `scale(${currentZoom}) translate(${panX}px, ${panY}px)`;
    }

    function resetZoom() {
      currentZoom = 1;
      panX = 0;
      panY = 0;
      lightboxImg.classList.remove('zoomed');
      updateTransform();
    }

    document.getElementById('container').addEventListener('click', (e) => {
      const progressItem = e.target.closest('.progress-item');
      if (progressItem) {
        const partIndex = parseInt(progressItem.dataset.partIndex);
        const pageIndex = parseInt(progressItem.dataset.pageIndex);
        openLightbox(partIndex, pageIndex);
      }
    });

    lightboxFillup.addEventListener('click', fillUp);
    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', showPrev);
    lightboxNext.addEventListener('click', showNext);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        resetZoom();
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') {
        resetZoom();
        closeLightbox();
      }
      if (e.key === 'ArrowLeft') {
        resetZoom();
        showPrev();
      }
      if (e.key === 'ArrowRight') {
        resetZoom();
        showNext();
      }
    });

    lightboxImg.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.deltaY < 0) {
        currentZoom = Math.min(currentZoom + 0.2, maxZoom);
      } else {
        currentZoom = Math.max(currentZoom - 0.2, minZoom);
        if (currentZoom === 1) {
          panX = 0;
          panY = 0;
        }
      }
      if (currentZoom > 1) {
        lightboxImg.classList.add('zoomed');
        lightboxFillup.style.display = 'none';
      } else {
        lightboxFillup.style.display = 'block';
      }
      updateTransform();
    });

    lightboxImg.addEventListener('dblclick', resetZoom);

    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let lastPanX = 0;
    let lastPanY = 0;
    let dragged = false;

    lightbox.addEventListener('mousedown', (e) => {
      if (e.target === lightboxImg && currentZoom > 1) {
        isDragging = true;
        dragged = false;
        startX = e.clientX;
        startY = e.clientY;
        lastPanX = panX;
        lastPanY = panY;
        lightboxImg.style.cursor = 'grabbing';
        e.preventDefault();
      }
    });

    lightbox.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.clientX - startX;
        const deltaY = e.clientY - startY;
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
          dragged = true;
        }
        panX = lastPanX + deltaX / currentZoom;
        panY = lastPanY + deltaY / currentZoom;
        updateTransform();
      }
    });

    lightbox.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        lightboxImg.style.cursor = 'grab';
        if (!dragged) {
          if (lightboxImg.classList.contains('zoomed')) {
            resetZoom();
          } else {
            lightboxImg.classList.add('zoomed');
            currentZoom = 2;
            lightboxFillup.style.display = 'none';
            updateTransform();
          }
        }
      }
    });

    let initialPinchDistance = 0;
    let initialScale = 1;
    let lastTouchX = 0;
    let lastTouchY = 0;
    let lastPanTouchX = 0;
    let lastPanTouchY = 0;
    let touchStartTime = 0;
    let touchDragged = false;

    lightbox.addEventListener('touchstart', (e) => {
      touchStartTime = Date.now();
      touchDragged = false;
      if (e.touches.length === 2) {
        initialPinchDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        initialScale = currentZoom;
        lastPanTouchX = panX;
        lastPanTouchY = panY;
      } else if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        lastPanTouchX = panX;
        lastPanTouchY = panY;
      }
    });

    lightbox.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const pinchDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const scale = (pinchDistance / initialPinchDistance) * initialScale;
        currentZoom = Math.max(minZoom, Math.min(scale, maxZoom));
        if (currentZoom > 1) {
          lightboxImg.classList.add('zoomed');
          lightboxFillup.style.display = 'none';
        } else {
          panX = 0;
          panY = 0;
          lightboxFillup.style.display = 'block';
        }
        updateTransform();
      } else if (e.touches.length === 1 && currentZoom > 1) {
        e.preventDefault();
        const deltaX = e.touches[0].clientX - lastTouchX;
        const deltaY = e.touches[0].clientY - lastTouchY;
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
          touchDragged = true;
        }
        panX = lastPanTouchX + deltaX / currentZoom;
        panY = lastPanTouchY + deltaY / currentZoom;
        updateTransform();
      }
    });

    lightbox.addEventListener('touchend', (e) => {
      const touchDuration = Date.now() - touchStartTime;
      if (touchDuration < 300 && !touchDragged && e.changedTouches.length === 1) {
        if (lightboxImg.classList.contains('zoomed')) {
          resetZoom();
        } else {
          lightboxImg.classList.add('zoomed');
          currentZoom = 2;
          lightboxFillup.style.display = 'none';
          updateTransform();
        }
      }
    });

    render();
  </script>
</body>
</html>
