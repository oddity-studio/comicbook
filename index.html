<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comicbook - Collectibles</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .part-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .head-caption {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 4px;
    }

    .progress-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .progress-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .page-caption {
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
    }

    .progress-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .portrait {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2d2d44;
      border: 2px solid #444;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .portrait:hover {
      transform: scale(1.1);
      border-color: #e94560;
    }

    .progress-bar-container {
      flex: 1;
      height: 24px;
      background: #2d2d44;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border-radius: 12px;
      transition: width 0.3s ease;
    }

    .progress-text {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .play-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .play-btn:disabled {
      cursor: not-allowed;
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 80%;
      position: relative;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 8px;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      z-index: 1001;
    }

    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      padding: 20px;
      user-select: none;
    }

    .lightbox-prev {
      left: 20px;
    }

    .lightbox-next {
      right: 20px;
    }

    .lightbox-prev:hover,
    .lightbox-next:hover,
    .lightbox-close:hover {
      color: #e94560;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- PART I -->
    <div class="part-section">
      <div class="head-caption">PART I</div>
      <div class="progress-list">
        <div class="progress-item">
          <div class="page-caption">PAGE 1</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=1&background=2d2d44&color=fff&size=40" alt="" class="portrait" data-index="0">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 75%"></div>
              <span class="progress-text">3/4</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 2</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=2&background=3d3d54&color=fff&size=40" alt="" class="portrait" data-index="1">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 40%"></div>
              <span class="progress-text">2/5</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 3</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=3&background=4d4d64&color=fff&size=40" alt="" class="portrait" data-index="2">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 33.33%"></div>
              <span class="progress-text">1/3</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 4</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=4&background=5d5d74&color=fff&size=40" alt="" class="portrait" data-index="3">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 100%"></div>
              <span class="progress-text">4/4</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 5</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=5&background=6d6d84&color=fff&size=40" alt="" class="portrait" data-index="4">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 0%"></div>
              <span class="progress-text">0/6</span>
            </div>
          </div>
        </div>
      </div>
      <button class="play-btn" disabled>PLAY PART I</button>
    </div>

    <!-- PART II -->
    <div class="part-section">
      <div class="head-caption">PART II</div>
      <div class="progress-list">
        <div class="progress-item">
          <div class="page-caption">PAGE 1</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=1&background=2d2d44&color=fff&size=40" alt="" class="portrait" data-index="5">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 50%"></div>
              <span class="progress-text">1/2</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 2</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=2&background=3d3d54&color=fff&size=40" alt="" class="portrait" data-index="6">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 60%"></div>
              <span class="progress-text">3/5</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 3</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=3&background=4d4d64&color=fff&size=40" alt="" class="portrait" data-index="7">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 0%"></div>
              <span class="progress-text">0/4</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 4</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=4&background=5d5d74&color=fff&size=40" alt="" class="portrait" data-index="8">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 66.67%"></div>
              <span class="progress-text">2/3</span>
            </div>
          </div>
        </div>
      </div>
      <button class="play-btn" disabled>PLAY PART II</button>
    </div>

    <!-- PART III -->
    <div class="part-section">
      <div class="head-caption">PART III</div>
      <div class="progress-list">
        <div class="progress-item">
          <div class="page-caption">PAGE 1</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=1&background=2d2d44&color=fff&size=40" alt="" class="portrait" data-index="9">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 80%"></div>
              <span class="progress-text">4/5</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 2</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=2&background=3d3d54&color=fff&size=40" alt="" class="portrait" data-index="10">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 33.33%"></div>
              <span class="progress-text">1/3</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 3</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=3&background=4d4d64&color=fff&size=40" alt="" class="portrait" data-index="11">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 50%"></div>
              <span class="progress-text">2/4</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 4</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=4&background=5d5d74&color=fff&size=40" alt="" class="portrait" data-index="12">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 0%"></div>
              <span class="progress-text">0/2</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 5</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=5&background=6d6d84&color=fff&size=40" alt="" class="portrait" data-index="13">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 60%"></div>
              <span class="progress-text">3/5</span>
            </div>
          </div>
        </div>
        <div class="progress-item">
          <div class="page-caption">PAGE 6</div>
          <div class="progress-header">
            <img src="https://ui-avatars.com/api/?name=6&background=7d7d94&color=fff&size=40" alt="" class="portrait" data-index="14">
            <div class="progress-bar-container">
              <div class="progress-bar" style="width: 25%"></div>
              <span class="progress-text">1/4</span>
            </div>
          </div>
        </div>
      </div>
      <button class="play-btn" disabled>PLAY PART III</button>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close">&times;</span>
    <span class="lightbox-prev">&#10094;</span>
    <span class="lightbox-next">&#10095;</span>
    <div class="lightbox-content">
      <img src="" alt="" class="lightbox-img" id="lightbox-img">
    </div>
  </div>

  <script>
    const portraits = document.querySelectorAll('.portrait');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxClose = document.querySelector('.lightbox-close');
    const lightboxPrev = document.querySelector('.lightbox-prev');
    const lightboxNext = document.querySelector('.lightbox-next');

    let currentIndex = 0;
    const images = Array.from(portraits).map(p => p.src);

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = images[currentIndex];
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      lightboxImg.src = images[currentIndex];
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % images.length;
      lightboxImg.src = images[currentIndex];
    }

    portraits.forEach((portrait, index) => {
      portrait.addEventListener('click', () => openLightbox(index));
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', showPrev);
    lightboxNext.addEventListener('click', showNext);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') showPrev();
      if (e.key === 'ArrowRight') showNext();
    });
  </script>
</body>
</html>
