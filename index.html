<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comicbook - Collectibles</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .part-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .head-caption {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 4px;
    }

    .progress-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .progress-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .page-caption {
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
    }

    .progress-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .portrait {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2d2d44;
      border: 2px solid #444;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .portrait:hover {
      transform: scale(1.1);
      border-color: #e94560;
    }

    .progress-bar-container {
      flex: 1;
      height: 24px;
      background: #2d2d44;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border-radius: 12px;
      transition: width 0.3s ease;
    }

    .progress-text {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .play-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .play-btn:disabled {
      cursor: not-allowed;
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 80%;
      position: relative;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 8px;
      transition: transform 0.2s ease;
      transform-origin: center center;
      cursor: zoom-in;
    }

    .lightbox-img.zoomed {
      transform: scale(2);
      cursor: zoom-out;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      z-index: 1001;
    }

    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      padding: 20px;
      user-select: none;
    }

    .lightbox-prev {
      left: 20px;
    }

    .lightbox-next {
      right: 20px;
    }

    .lightbox-prev:hover,
    .lightbox-next:hover,
    .lightbox-close:hover {
      color: #e94560;
    }

    .lightbox-info {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .lightbox-part {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #fff;
    }

    .lightbox-page {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }

    .lightbox-fillup {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s ease;
      z-index: 1002;
    }

    .lightbox-fillup:hover {
      background: #ff6b6b;
    }

    .lightbox-fillup.hidden {
      display: none;
    }
  </style>
</head>

      <img src="" alt="" class="lightbox-img" id="lightbox-img">
    </div>

      <div class="lightbox-part" id="lightbox-part"></div>
      <div class="lightbox-page" id="lightbox-page"></div>
    </div>

  <script>
    const portraits = document.querySelectorAll('.portrait');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxPart = document.getElementById('lightbox-part');
    const lightboxPage = document.getElementById('lightbox-page');
    const lightboxClose = document.querySelector('.lightbox-close');
    const lightboxPrev = document.querySelector('.lightbox-prev');
    const lightboxNext = document.querySelector('.lightbox-next');
    const lightboxFillup = document.getElementById('lightbox-fillup');

    let currentIndex = 0;
    const images = Array.from(portraits).map(p => ({
      src: p.src,
      part: p.dataset.part,
      page: p.dataset.page,
      current: parseInt(p.dataset.current),
      max: parseInt(p.dataset.max)
    }));

    function updateFillupButton() {
      const current = images[currentIndex].current;
      const max = images[currentIndex].max;
      if (current >= max) {
        lightboxFillup.style.display = 'none';
      } else {
        lightboxFillup.style.display = 'block';
      }
    }

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = images[currentIndex].src;
      lightboxPart.textContent = images[currentIndex].part;
      lightboxPage.textContent = images[currentIndex].page;
      resetZoom();
      updateFillupButton();
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      lightboxImg.src = images[currentIndex].src;
      lightboxPart.textContent = images[currentIndex].part;
      lightboxPage.textContent = images[currentIndex].page;
      resetZoom();
      updateFillupButton();
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % images.length;
      lightboxImg.src = images[currentIndex].src;
      lightboxPart.textContent = images[currentIndex].part;
      lightboxPage.textContent = images[currentIndex].page;
      resetZoom();
      updateFillupButton();
    }

    function fillUp() {
      const portrait = portraits[currentIndex];
      const current = images[currentIndex].current;
      const max = images[currentIndex].max;
      
      if (current >= max) return;
      
      const newCurrent = current + 1;
      images[currentIndex].current = newCurrent;
      
      portrait.dataset.current = newCurrent;
      
      const newPercent = (newCurrent / max) * 100;
      const progressBar = portrait.parentElement.querySelector('.progress-bar');
      const progressText = portrait.parentElement.querySelector('.progress-text');
      
      progressBar.style.width = newPercent + '%';
      progressText.textContent = newCurrent + '/' + max;
      
      let newSrc = 'public/Page1-' + newCurrent + '.webp';
      if (newCurrent === max) {
        newSrc = 'public/Page1-full.webp';
      }
      
      portrait.src = newSrc;
      lightboxImg.src = newSrc;
      images[currentIndex].src = newSrc;
      
      updateFillupButton();
    }

    lightboxFillup.addEventListener('click', fillUp);

    portraits.forEach((portrait, index) => {
      portrait.addEventListener('click', () => openLightbox(index));
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', showPrev);
    lightboxNext.addEventListener('click', showNext);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        resetZoom();
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') {
        resetZoom();
        closeLightbox();
      }
      if (e.key === 'ArrowLeft') {
        resetZoom();
        showPrev();
      }
      if (e.key === 'ArrowRight') {
        resetZoom();
        showNext();
      }
    });

    let currentZoom = 1;
    let panX = 0;
    let panY = 0;
    const maxZoom = 2;
    const minZoom = 1;

    function updateTransform() {
      lightboxImg.style.transform = `scale(${currentZoom}) translate(${panX}px, ${panY}px)`;
    }

    function resetZoom() {
      currentZoom = 1;
      panX = 0;
      panY = 0;
      lightboxImg.classList.remove('zoomed');
      updateFillupButton();
      updateTransform();
    }

    lightboxImg.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.deltaY < 0) {
        currentZoom = Math.min(currentZoom + 0.2, maxZoom);
      } else {
        currentZoom = Math.max(currentZoom - 0.2, minZoom);
        if (currentZoom === 1) {
          panX = 0;
          panY = 0;
        }
      }
      if (currentZoom > 1) {
        lightboxImg.classList.add('zoomed');
        lightboxFillup.style.display = 'none';
      } else {
        updateFillupButton();
      }
      updateTransform();
    });

    lightboxImg.addEventListener('dblclick', resetZoom);

    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let lastPanX = 0;
    let lastPanY = 0;
    let dragged = false;

    lightbox.addEventListener('mousedown', (e) => {
      if (e.target === lightboxImg && currentZoom > 1) {
        isDragging = true;
        dragged = false;
        startX = e.clientX;
        startY = e.clientY;
        lastPanX = panX;
        lastPanY = panY;
        lightboxImg.style.cursor = 'grabbing';
        e.preventDefault();
      }
    });

    lightbox.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.clientX - startX;
        const deltaY = e.clientY - startY;
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
          dragged = true;
        }
        panX = lastPanX + deltaX / currentZoom;
        panY = lastPanY + deltaY / currentZoom;
        updateTransform();
      }
    });

    lightbox.addEventListener('mouseup', (e) => {
      if (isDragging) {
        isDragging = false;
        lightboxImg.style.cursor = 'grab';
        if (!dragged) {
          if (lightboxImg.classList.contains('zoomed')) {
            resetZoom();
          } else {
            lightboxImg.classList.add('zoomed');
            currentZoom = 2;
            lightboxFillup.style.display = 'none';
            updateTransform();
          }
        }
      }
    });

    let initialPinchDistance = 0;
    let initialScale = 1;
    let lastTouchX = 0;
    let lastTouchY = 0;
    let lastPanTouchX = 0;
    let lastPanTouchY = 0;
    let touchStartTime = 0;
    let touchDragged = false;

    lightbox.addEventListener('touchstart', (e) => {
      touchStartTime = Date.now();
      touchDragged = false;
      if (e.touches.length === 2) {
        initialPinchDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        initialScale = currentZoom;
        lastPanTouchX = panX;
        lastPanTouchY = panY;
      } else if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        lastPanTouchX = panX;
        lastPanTouchY = panY;
      }
    });

    lightbox.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const pinchDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const scale = (pinchDistance / initialPinchDistance) * initialScale;
        currentZoom = Math.max(minZoom, Math.min(scale, maxZoom));
        if (currentZoom > 1) {
          lightboxImg.classList.add('zoomed');
        } else {
          panX = 0;
          panY = 0;
        }
        updateTransform();
      } else if (e.touches.length === 1 && currentZoom > 1) {
        e.preventDefault();
        const deltaX = e.touches[0].clientX - lastTouchX;
        const deltaY = e.touches[0].clientY - lastTouchY;
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
          touchDragged = true;
        }
        panX = lastPanTouchX + deltaX / currentZoom;
        panY = lastPanTouchY + deltaY / currentZoom;
        updateTransform();
      }
    });

    lightbox.addEventListener('touchend', (e) => {
      const touchDuration = Date.now() - touchStartTime;
      if (touchDuration < 300 && !touchDragged && e.changedTouches.length === 1) {
        if (lightboxImg.classList.contains('zoomed')) {
          resetZoom();
        } else {
          lightboxImg.classList.add('zoomed');
          currentZoom = 2;
          lightboxFillup.style.display = 'none';
          updateTransform();
        }
      }
    });
  </script>
</body>
</html>
