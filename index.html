<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comicbook - Collectibles</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .head-caption {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .progress-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .progress-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .page-caption {
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
    }

    .progress-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .portrait {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2d2d44;
      border: 2px solid #444;
      object-fit: cover;
    }

    .progress-bar-container {
      flex: 1;
      height: 24px;
      background: #2d2d44;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border-radius: 12px;
      transition: width 0.3s ease;
    }

    .progress-text {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .play-btn {
      margin-top: 16px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .play-btn:disabled {
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="head-caption">PART I</div>
    
    <div class="progress-list">
      <div class="progress-item">
        <div class="page-caption">PAGE 1</div>
        <div class="progress-header">
          <img src="" alt="" class="portrait">
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 100%"></div>
            <span class="progress-text">5/5</span>
          </div>
        </div>
      </div>

      <div class="progress-item">
        <div class="page-caption">PAGE 2</div>
        <div class="progress-header">
          <img src="" alt="" class="portrait">
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 66.67%"></div>
            <span class="progress-text">4/6</span>
          </div>
        </div>
      </div>

      <div class="progress-item">
        <div class="page-caption">PAGE 3</div>
        <div class="progress-header">
          <img src="" alt="" class="portrait">
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 0%"></div>
            <span class="progress-text">0/3</span>
          </div>
        </div>
      </div>

      <div class="progress-item">
        <div class="page-caption">PAGE 4</div>
        <div class="progress-header">
          <img src="" alt="" class="portrait">
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 20%"></div>
            <span class="progress-text">1/5</span>
          </div>
        </div>
      </div>

      <div class="progress-item">
        <div class="page-caption">PAGE 5</div>
        <div class="progress-header">
          <img src="" alt="" class="portrait">
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 40%"></div>
            <span class="progress-text">2/5</span>
          </div>
        </div>
      </div>
    </div>

    <button class="play-btn" disabled>PLAY NOW</button>
  </div>
</body>
</html>
