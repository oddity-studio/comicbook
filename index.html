<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comicbook - Collectibles</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@1,800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #2a2040 0%, #1a1528 50%, #1a1528 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1528;
    }

    ::-webkit-scrollbar-thumb {
      background: #3a3050;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4a4060;
    }

    ::-webkit-scrollbar-button {
      display: none;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 10vh 20px 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      position: relative;
      z-index: 1;
    }

    .part-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
    }

    .part-section.hidden {
      display: none;
    }

    .head-caption {
      position: relative;
      font-family: 'Exo 2', sans-serif;
      font-size: 36px;
      font-weight: 800;
      font-style: italic;
      letter-spacing: 4px;
      background: linear-gradient(180deg, #ffffff 0%, #c0c0c0 50%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(2px 2px 0 #4a5a6a) drop-shadow(4px 4px 3px rgba(0,0,0,0.3));
    }

    .part-name {
      font-size: 18px;
      font-weight: bold;
      color: #ff8a30;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 4px;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    }

    .part-separator {
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg, transparent, #ff8a30, transparent);
      position: relative;
      margin: 20px 0;
    }

    .part-separator::before {
      content: '✦';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #1a1528;
      padding: 0 15px;
      color: #ff8a30;
      font-size: 20px;
    }

    .progress-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .part-bg {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90vw;
      height: 500px;
      object-fit: cover;
      opacity: 0.5;
      z-index: -1;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
    }
    
    .progress-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      background: linear-gradient(145deg, #5a5a7a, #3a3a50);
      border-radius: 12px;
      padding: 12px;
      position: relative;
      overflow: hidden;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 
        0 6px 0 #1a1a2a,
        0 8px 10px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -1px 0 rgba(0,0,0,0.3);
      border: 1px solid #6a6a8a;
    }

      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3d3dtbW17e3t1dXWBgYGHh4d5eXlzc3OLi4ubm5uVlZWPj4+NjY19fX2JiYl/f39ra2uRkZGZmZlpaWmXl5dvb29xcXGTk5NnZ2c8TV1mAAAAG3RSTlNAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEAvEOwtAAAFVklEQVR4XpWWB67c2BUFb3g557T/hRo9/WUMZHlgr4Bg8Z4qQgQJlHI4A8SzFVrapvmTF9O7dmYRFZ60YiBhJRCgh1FYhiLAmdvX0CzTOpNE77ME0Zty/nWWzchDtiqrmQDeuv3powQ5ta2eN0FY0InkqDD73lT9c9lEzwUNqgFHs9VQce3TVClFCQrSTfOiYkVJQBmpbq2L6iZavPnAPcoU0dSw0SUTqz/GtrGuXfbyyBniKykOWQWGqwwMA7QiYAxi+IlPdqo+hYHnUt5ZPfnsHJyNiDtnpJyayNBkF6cWoYGAMY92U2hXHF/C1M8uP/ZtYdiuj26UdAdQQSXQErwSOMzt/XWRWAz5GuSBIkwG1H3FabJ2OsUOUhGC6tK4EMtJO0ttC6IBD3kM0ve0tJwMdSfjZo+EEISaeTr9P3wYrGjXqyC1krcKdhMpxEnt5JetoulscpyzhXN5FRpuPHvbeQaKxFAEB6EN+cYN6xD7RYGpXpNndMmZgM5Dcs3YSNFDHUo2LGfZuukSWyUYirJAdYbF3MfqEKmjM+I2EfhA94iG3L7uKrR+GdWD73ydlIB+6hgref1QTlmgmbM3/LeX5GI1Ux1RWpgxpLuZ2+I+IjzZ8wqE4nilvQdkUdfhzI5QDWy+kw5Wgg2pGpeEVeCCA7b85BO3F9DzxB3cdqvBzWcmzbyMiqhzuYqtHRVG2y4x+KOlnyqla8AoWWpuBoYRxzXrfKuILl6SfiWCbjxoZJUaCBj1CjH7GIaDbc9kqBY3W/Rgjda1iqQcOJu2WW+76pZC9QG7M00dffe9hNnseupFL53r8F7YHSwJWUKP2q+k7RdsxyOB11n0xtOvnW4irMMFNV4H0uqwS5ExsmP9AxbDTc9JwgneAT5vTiUSm1E7BSflSt3bfa1tv8Di3R8n3Af7MNWzs49hmauE2wP+ttrq+AsWpFG2awvsuOqbipWHgtuvuaAE+A1Z/7gC9hesnr+7wqCwG8c5yAg3AL1fm8T9AZtp/bbJGwl1pNrE7RuOX7PeMRUERVaPpEs+yqeoSmuOlokqw49pgomjLeh7icHNlG19yjs6XXOMedYm5xH2YxpV2tc0Ro2jJfxC50ApuxGob7lMsxfTbeUv07TyYxpeLucEH1gNd4IKH2LAg5TdVhlCafZvpskfncCfx8pOhJzd76bJWeYFnFciwcYfubRc12Ip/ppIhA1/mSZ/RxjFDrJC5xifFjJpY2Xl5zXdguFqYyTR1zSp1Y9p+tktDYYSNflcxI0iyO4TPBdlRcpeqjK/piF5bklq77VSEaA+z8qmJTFzIWiitbnzR794USKBUaT0NTEsVjZqLaFVqJoPN9ODG70IPbfBHKK+/q/AWR0tJzYHRULOa4MP+W/HfGadZUbfw177G7j/OGbIs8TahLyynl4X4RinF793Oz+BU0saXtUHrVBFT/DnA3ctNPoGbs4hRIjTok8i+algT1lTHi4SxFvONKNrgQFAq2/gFnWMXgwffgYMJpiKYkmW3tTg3ZQ9Jq+f8XN+A5eeUKHWvJWJ2sgJ1Sop+wwhqFVijqWaJhwtD8MNlSBeWNNWTa5Z5kPZw5+LbVT99wqTdx29lMUH4OIG/D86ruKEauBjvH5xy6um/Sfj7ei6UUVk4AIl3MyD4MSSTOFgSwsH/QJWaQ5as7ZcmgBZkzjjU1UrQ74ci1gWBCSGHtuV1H2mhSnO3Wp/3fEV5a+4wz//6qy8JxjZsmxxy5+4w9CDNJY09T072iKG0EnOS0arEYgXqYnXcYHwjTtUNAcMelOd4xpkoqiTYICWFq0JSiPfPDQdnt+4/wuqcXY47QILbgAAAABJRU5ErkJggg==);
      background-repeat: repeat;
      opacity: 0.08;
      border-radius: 12px;
      pointer-events: none;
      z-index: 1;
    }

    .progress-item::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
      border-radius: 12px 12px 0 0;
      pointer-events: none;
      z-index: 2;
    }

    .progress-item:hover::after {
      left: 150%;
      transition: left 0.5s ease;
    }

    .progress-item:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 9px 0 #1a1a2a,
        0 12px 15px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.4),
        inset 0 -1px 0 rgba(0,0,0,0.3);
    }

    .progress-item:active {
      transform: translateY(3px);
      box-shadow: 
        0 3px 0 #1a1a2a,
        0 4px 5px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.1),
        inset 0 -1px 0 rgba(0,0,0,0.4);
    }

    .page-caption {
      font-size: 16px;
      color: #aaa;
      letter-spacing: 2px;
      text-align: center;
      min-width: 80px;
      font-weight: bold;
    }

    .progress-caption {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
      font-weight: bold;
      z-index: 1;
      transition: color 0.3s ease;
    }

    .progress-caption.filled {
      color: #3a3a3a;
    }

    .progress-header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .portrait {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #2d2d44;
      border: 2px solid #444;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .progress-item:hover .portrait {
      transform: scale(1.1);
      border-color: #444;
      box-shadow: 0 0 10px rgba(100, 100, 100, 0.4);
    }

    .progress-item.complete:hover .portrait {
      transform: scale(1.15);
      border-color: #60c0ff;
      box-shadow: 0 0 25px rgba(96, 192, 255, 0.7);
    }

    .progress-bar-container {
      flex: 1;
      height: 26px;
      background: linear-gradient(145deg, #2a2a40, #1a1a30);
      border-radius: 13px;
      overflow: hidden;
      position: relative;
      box-shadow: 
        0 3px 0 #151520,
        0 5px 6px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.2),
        inset 0 -1px 0 rgba(0,0,0,0.4);
      border: 2px solid #4a4a60;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3080ff, #60a0ff);
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    .progress-bar.complete {
      animation: cyanPulse 2s infinite;
      position: relative;
      overflow: hidden;
    }

    .progress-bar.complete::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -30%;
      width: 30%;
      height: 200%;
      background: linear-gradient(135deg, transparent 20%, rgba(0, 255, 255, 0.6) 50%, transparent 80%);
      mix-blend-mode: screen;
      animation: streak 2s ease-in-out infinite;
      transform: skewX(-15deg);
    }

    @keyframes cyanPulse {
      0%, 100% {
        box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.4);
      }
      50% {
        box-shadow: inset 0 0 25px rgba(0, 255, 255, 0.7);
      }
    }

    @keyframes streak {
      0% {
        left: -30%;
      }
      100% {
        left: 130%;
      }
    }

    .progress-text {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .futuristic-btn {
      border: 1px solid #888;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transform: skewX(-10deg);
      zoom: 1.5;
      height: 50px;
      width: 200px;
      border-radius: 20px 5px 20px 0px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font: 15px sans-serif;
      font-weight: 300;
      text-shadow: 0 0 20px #fff;
      text-transform: uppercase;
      animation: breath2 2s 0.5s infinite alternate;
      transition: all 0.2s ease;
      cursor: pointer;
      z-index: 10;
    }

    .futuristic-btn:active {
      animation: bounce 0.4s ease !important;
    }

    @keyframes bounce {
      0% { transform: skewX(-10deg) scale(1); }
      50% { transform: skewX(-10deg) scale(0.9); }
      100% { transform: skewX(-10deg) scale(1); }
    }

    .futuristic-btn.fire {
      border-color: #ffeca8;
      background-image: linear-gradient(to bottom, rgba(255, 138, 48, 0.8), rgba(240, 96, 29, 0.8));
      box-shadow: 0 0 70px rgba(255, 138, 48, 0.6), 0 5px 20px rgba(255, 138, 48, 0.6), inset 0 1px #ffeca8, inset 0 -1px #ffeca8;
      color: #ffeca8;
    }

    .futuristic-btn.fire:before {
      box-shadow: inset 0 0 30px 0 #ffeca8;
    }

    .futuristic-btn.ice {
      border-color: #a8ecff;
      background-image: linear-gradient(to bottom, rgba(48, 138, 255, 0.8), rgba(29, 96, 240, 0.8));
      box-shadow: 0 0 70px rgba(48, 138, 255, 0.6), 0 5px 20px rgba(48, 138, 255, 0.6), inset 0 1px #a8ecff, inset 0 -1px #a8ecff;
      color: #a8ecff;
    }

    .futuristic-btn.ice:before {
      box-shadow: inset 0 0 30px 0 #a8ecff;
    }

    .futuristic-btn:before {
      content: "";
      display: block;
      width: calc(100% - 22px);
      height: calc(50px - 8px);
      animation: breath 2s infinite alternate;
      left: 10px;
      top: 3px;
      position: absolute;
      background-color: transparent;
      border: 1px solid #fff;
      border-radius: 15px 3px 15px 3px;
    }

    @keyframes breath {
      0% { transform: scaleX(1); }
      100% { transform: scaleX(0.95); }
    }

    @keyframes breath2 {
      0% { transform: skewX(-10deg) scaleX(1); }
      100% { transform: skewX(-10deg) scaleX(0.95); }
    }

    .play-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #ff6b6b;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      opacity: 0.5;
    }





    .play-btn.futuristic:hover {
      box-shadow: 0 0 70px rgba(255, 138, 48, 0.8), 0 5px 20px rgba(255, 138, 48, 0.8), inset 0 1px #ffeca8, inset 0 -1px #ffeca8;
    }

    .play-btn.futuristic:hover:before {
      box-shadow: inset 0 0 50px 0 #ffeca8;
    }

    .play-btn:disabled {
      cursor: not-allowed;
    }

    .locked-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #444;
      color: #888;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      opacity: 0.7;
    }



    .unlock-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .unlock-btn.futuristic {
      border-color: #a8ecff;
      background-image: linear-gradient(to bottom, rgba(48, 138, 255, 0.8), rgba(29, 96, 240, 0.8));
      box-shadow: 0 0 70px rgba(48, 138, 255, 0.6), 0 5px 20px rgba(48, 138, 255, 0.6), inset 0 1px #ffeca8, inset 0 -1px #ffeca8;
      color: #a8ecff;
      text-shadow: 0 0 20px #fff;
    }

    .unlock-btn.futuristic:before {
      width: calc(100% - 22px);
      height: calc(50px - 8px);
      left: 10px;
      top: 3px;
      box-shadow: inset 0 0 30px 0 #a8ecff;
    }

    .unlock-btn.futuristic:hover {
      box-shadow: 0 0 70px rgba(48, 138, 255, 0.75), 0 5px 20px rgba(48, 138, 255, 0.75), inset 0 1px #a8ecff, inset 0 -1px #a8ecff;
    }

    .unlock-btn.futuristic:hover:before {
      box-shadow: inset 0 0 50px 0 #a8ecff;
    }

    .unlock-btn:hover {
      background: #f0abfc;
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .lightbox.active {
      display: flex;
      animation: lightboxOpen 0.4s ease-out forwards;
    }

    @keyframes lightboxOpen {
      0% {
        background: transparent;
      }
      100% {
        background: rgba(0, 0, 0, 0.6);
      }
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 80%;
      position: relative;
    }

    .lightbox-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
      pointer-events: none;
      opacity: 0;
      z-index: 10;
    }

    .lightbox-overlay.animating {
      animation: scanlineReveal 0.3s ease-in-out forwards;
      opacity: 1;
    }

    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ff8a30, transparent);
      box-shadow: 0 0 20px 10px rgba(255, 138, 48, 0.5);
      opacity: 0;
      z-index: 20;
      pointer-events: none;
    }

    .scanline.animating {
      opacity: 1;
      animation: scanline 0.3s ease-in-out forwards;
    }

    @keyframes scanlineReveal {
      0% {
        clip-path: inset(0 0 100% 0);
      }
      100% {
        clip-path: inset(0 0 0% 0);
      }
    }

    @keyframes scanline {
      0% {
        top: 0;
      }
      100% {
        top: 100%;
      }
    }

    .lightbox-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 8px;
      transition: transform 0.2s ease;
      transform-origin: center center;
      cursor: zoom-in;
    }

    .lightbox-img.animating {
      animation: imgZoomIn 0.5s ease-out forwards;
    }

    .lightbox-img.zoomed {
      transform: scale(2);
      cursor: zoom-out;
    }

    @keyframes imgZoomIn {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes swipeLeftOut {
      0% {
        transform: translateX(0);
        opacity: 1;
      }
      100% {
        transform: translateX(-100%);
        opacity: 0;
      }
    }

    @keyframes swipeLeftIn {
      0% {
        transform: translateX(-100%);
        opacity: 0;
      }
      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes swipeRightOut {
      0% {
        transform: translateX(0);
        opacity: 1;
      }
      100% {
        transform: translateX(-100%);
        opacity: 0;
      }
    }

    @keyframes swipeRightIn {
      0% {
        transform: translateX(100%);
        opacity: 0;
      }
      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .lightbox-img.swipe-left-out {
      animation: swipeLeftOut 0.3s ease-out forwards;
    }

    .lightbox-img.swipe-left-in {
      animation: swipeLeftIn 0.3s ease-out forwards;
    }

    .lightbox-img.swipe-right-out {
      animation: swipeRightOut 0.3s ease-out forwards;
    }

    .lightbox-img.swipe-right-in {
      animation: swipeRightIn 0.3s ease-out forwards;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
    }

    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      padding: 20px;
      user-select: none;
    }

    .lightbox-prev {
      left: 5px;
    }

    .lightbox-next {
      right: 5px;
    }

    .lightbox-prev:hover,
    .lightbox-next:hover,
    .lightbox-close:hover {
      color: #ff8a30;
    }

    @media (max-width: 768px) {
      .lightbox-prev,
      .lightbox-next {
        display: none;
      }
    }

    .lightbox-fillup {
      margin-top: 15px;
      transform: skewX(-10deg);
      padding: 10px 24px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      background: #ff8a30;
      color: #fff;
      border: 1px solid #ff8a30;
      border-radius: 15px 3px 15px 3px;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 1002;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      text-shadow: 0 0 10px #fff;
      animation: fadeIn 0.3s ease-out 0.3s forwards;
      opacity: 0;
    }

    .lightbox-fillup:before {
      content: "";
      display: block;
      position: absolute;
      top: 3px;
      left: 8px;
      width: calc(100% - 16px);
      height: calc(100% - 6px);
      border: 1px solid #fff;
      border-radius: 12px 1px 12px 1px;
      box-shadow: inset 0 0 15px 0 rgba(255,255,255,0.5);
      pointer-events: none;
    }

    .lightbox-fillup:hover {
      background: #ffaa50;
      box-shadow: 0 0 40px rgba(255, 138, 48, 0.6), 0 5px 20px rgba(255, 100, 30, 0.4);
    }

    .lightbox-fillup.show-color:hover {
      background: #3080ff;
    }
    
    /* Make the lightbox fillup button also use futuristic styling */
    .lightbox-fillup.futuristic-btn {
      border: 1px solid green;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transform: skewX(-10deg);
      zoom: 0.9;
      height: 50px;
      width: 200px;
      border-radius: 20px 5px 20px 0px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font: 15px sans-serif;
      font-weight: 300;
      text-shadow: 0 0 20px #fff;
      text-transform: uppercase;
      animation: breath2 2s 0.5s infinite alternate, fadeIn 0.3s ease-out 0.3s forwards;
      transition: all 0.2s ease;
      cursor: pointer;
      padding: 0;
      margin-top: 15px;
      opacity: 0;
    }
    
    .lightbox-fillup.futuristic-btn:before {
      content: "";
      display: block;
      width: calc(100% - 22px);
      height: calc(50px - 8px);
      animation: breath 2s infinite alternate;
      left: 10px;
      top: 3px;
      position: absolute;
      background-color: transparent;
      border: 1px solid #fff;
      border-radius: 15px 3px 15px 3px;
    }
    
    .lightbox-fillup.futuristic-btn.fire {
      border-color: #ffeca8;
      background-image: linear-gradient(
        to bottom,
        rgba(255, 138, 48, 0.8),
        rgba(240, 96, 29, 0.8)
      );
      box-shadow: 0 0 70px rgba(255, 138, 48, 0.6),
        0 5px 20px rgba(255, 138, 48, 0.6), inset 0 1px #ffeca8,
        inset 0 -1px #ffeca8;
      color: #ffeca8;
    }
    
    .lightbox-fillup.futuristic-btn.fire:before {
      box-shadow: inset 0 0 30px 0 #ffeca8;
    }
    
    .lightbox-fillup.futuristic-btn:hover.fire {
      box-shadow: 0 0 70px rgba(255, 138, 48, 0.8),
        0 5px 20px rgba(255, 138, 48, 0.8), inset 0 1px #ffeca8,
        inset 0 -1px #ffeca8;
    }
    
    .lightbox-fillup.futuristic-btn:hover.fire:before {
      box-shadow: inset 0 0 50px 0 #ffeca8;
    }
    
    .lightbox-fillup.futuristic-btn.ice {
      border-color: #a8ecff;
      background-image: linear-gradient(to bottom, rgba(48, 138, 255, 0.8), rgba(29, 96, 240, 0.8));
      box-shadow: 0 0 70px rgba(48, 138, 255, 0.6), 0 5px 20px rgba(48, 138, 255, 0.6), inset 0 1px #a8ecff, inset 0 -1px #a8ecff;
      color: #a8ecff;
    }
    
    .lightbox-fillup.futuristic-btn.ice:before {
      box-shadow: inset 0 0 30px 0 #a8ecff;
    }
    
    .lightbox-fillup.futuristic-btn:hover.ice {
      box-shadow: 0 0 70px rgba(48, 138, 255, 0.75), 0 5px 20px rgba(48, 138, 255, 0.75), inset 0 1px #a8ecff, inset 0 -1px #a8ecff;
    }
    
    .lightbox-fillup.futuristic-btn:hover.ice:before {
      box-shadow: inset 0 0 50px 0 #a8ecff;
    }

    .lightbox-info {
      margin-top: 10px;
      text-align: center;
    }

    .lightbox-part {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #fff;
    }

    .lightbox-page {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
      animation: fadeIn 0.3s ease-out 0.4s forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container" id="container"></div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close">&times;</span>
    <span class="lightbox-prev">&#10094;</span>
    <span class="lightbox-next">&#10095;</span>
    <div class="lightbox-center">
      <div class="lightbox-content">
        <img src="" alt="" class="lightbox-img" id="lightbox-img">
        <img src="" alt="" class="lightbox-overlay" id="lightbox-overlay">
        <div class="scanline" id="scanline"></div>
      </div>
      <button class="lightbox-fillup" id="lightbox-fillup">FILL UP</button>
      <div class="lightbox-info">
        <div class="lightbox-part" id="lightbox-part"></div>
        <div class="lightbox-page" id="lightbox-page"></div>
      </div>
    </div>
  </div>

  <script>
    const data = {
      parts: [
        {
          order: 1,
          name: "Growing Pains",
          pages: [
            { order: 1, cap: 6, completion: 0, showColor: false },
            { order: 2, cap: 5, completion: 0, showColor: false },
            { order: 3, cap: 5, completion: 0, showColor: false },
            { order: 4, cap: 5, completion: 0, showColor: false },
            { order: 5, cap: 3, completion: 0, showColor: false }
          ]
        },
        {
          order: 2,
          name: "Ground Rules",
          locked: true,
          pages: [
            { order: 1, cap: 6, completion: 0, showColor: false },
            { order: 2, cap: 5, completion: 0, showColor: false },
            { order: 3, cap: 5, completion: 0, showColor: false },
            { order: 4, cap: 5, completion: 0, showColor: false }
          ]
        },
        {
          order: 3,
          name: "Enemy of My Enemy...",
          locked: true,
          pages: [
            { order: 1, cap: 6, completion: 0, showColor: false },
            { order: 2, cap: 5, completion: 0, showColor: false },
            { order: 3, cap: 5, completion: 0, showColor: false },
            { order: 4, cap: 5, completion: 0, showColor: false },
            { order: 5, cap: 3, completion: 0, showColor: false },
            { order: 6, cap: 6, completion: 0, showColor: false }
          ]
        }
      ]
    };

    function getPageStatus(page) {
      return page.completion >= page.cap ? 'complete' : 'incomplete';
    }

    function getPartStatus(part) {
      const completeCount = part.pages.filter(p => getPageStatus(p) === 'complete').length;
      return completeCount === part.pages.length ? 'complete' : 'incomplete';
    }

    function getPartPageCount(part) {
      return part.pages.length;
    }

    function getPartRange(part) {
      return { start: 0, end: 0 };
    }

    function toRoman(num) {
      const romanNumerals = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X'];
      return romanNumerals[num - 1] || num;
    }

    function render() {
      const container = document.getElementById('container');
      container.innerHTML = '';

      data.parts.forEach((part, partIndex) => {
        if (partIndex > 0) {
          const separator = document.createElement('div');
          separator.className = 'part-separator';
          container.appendChild(separator);
        }

        const partDiv = document.createElement('div');
        partDiv.className = 'part-section';
        partDiv.id = `part-${part.order}`;
        partDiv.style.position = 'relative';

        if (partIndex === 0) {
          const bgImg = document.createElement('img');
          bgImg.src = 'public/Part1-back.webp';
          bgImg.className = 'part-bg';
          partDiv.appendChild(bgImg);
        }

        const titleContainer = document.createElement('div');
        titleContainer.style.textAlign = 'center';

        const title = document.createElement('div');
        title.className = 'head-caption';
        title.textContent = `PART ${part.order}`;
        titleContainer.appendChild(title);

        const name = document.createElement('div');
        name.className = 'part-name';
        name.textContent = part.name;
        titleContainer.appendChild(name);

        partDiv.appendChild(titleContainer);

        if (part.locked) {
          const lockedBtn = document.createElement('button');
          lockedBtn.className = 'futuristic-btn';
          lockedBtn.id = `unlock-btn-${part.order}`;
          lockedBtn.textContent = 'LOCKED';
          lockedBtn.disabled = true;
          partDiv.appendChild(lockedBtn);
        } else {
          const progressList = document.createElement('div');
          progressList.className = 'progress-list';

          part.pages.forEach((page, pageIndex) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'progress-item';

            const progressHeader = document.createElement('div');
            progressHeader.className = 'progress-header';

            const img = document.createElement('img');
            img.className = 'portrait';
            img.id = `page-img-${partIndex}-${pageIndex}`;
            const iconSrc = page.completion >= page.cap 
              ? `public/Page${page.order}-icon-full.webp` 
              : `public/Page${page.order}-icon.webp`;
            img.src = iconSrc;
            img.alt = '';
            img.dataset.partIndex = partIndex;
            img.dataset.pageIndex = pageIndex;
            img.dataset.part = `PART ${part.order}`;
            img.dataset.page = `Page ${page.order}`;
            img.dataset.pageNum = page.order;
            img.dataset.current = page.completion;
            img.dataset.max = page.cap;
            progressHeader.appendChild(img);

            const barContainer = document.createElement('div');
            barContainer.className = 'progress-bar-container';
            barContainer.style.flex = '1';

            const barCaption = document.createElement('span');
            barCaption.className = 'progress-caption';
            barCaption.id = `page-caption-${partIndex}-${pageIndex}`;
            if (page.completion > 0) {
              barCaption.classList.add('filled');
            }
            barCaption.textContent = `PAGE ${page.order}`;
            barContainer.appendChild(barCaption);

            const bar = document.createElement('div');
            bar.className = 'progress-bar';
            const percent = page.cap > 0 ? (page.completion / page.cap) * 100 : 0;
            bar.style.width = `${percent}%`;
            if (page.completion >= page.cap) {
              bar.classList.add('complete');
            }
            barContainer.appendChild(bar);

            const text = document.createElement('span');
            text.className = 'progress-text';
            text.id = `page-text-${partIndex}-${pageIndex}`;
            text.textContent = `${page.completion}/${page.cap}`;
            barContainer.appendChild(text);

            progressHeader.appendChild(barContainer);
            pageDiv.appendChild(progressHeader);
            pageDiv.dataset.partIndex = partIndex;
            pageDiv.dataset.pageIndex = pageIndex;
            progressList.appendChild(pageDiv);
          });

          partDiv.appendChild(progressList);

           const partStatus = getPartStatus(part);
           if (partStatus === 'complete') {
             const playBtn = document.createElement('button');
             playBtn.className = 'futuristic-btn ice';
             playBtn.style.zoom = '0.9';
             playBtn.disabled = true;
             playBtn.textContent = `PLAY PART ${toRoman(part.order)}`;
             partDiv.appendChild(playBtn);
           }
        }

        container.appendChild(partDiv);
      });

      checkUnlocks();
    }

    function checkUnlocks() {
      data.parts.forEach((part, index) => {
        if (part.locked && index > 0) {
          const prevPart = data.parts[index - 1];
          const prevStatus = getPartStatus(prevPart);

          if (prevStatus === 'complete') {
            const unlockBtn = document.getElementById(`unlock-btn-${part.order}`);
            if (unlockBtn && unlockBtn.classList.contains('futuristic-btn')) {
              unlockBtn.textContent = 'UNLOCK NOW';
              unlockBtn.classList.remove('ice');
              unlockBtn.classList.add('fire');
              unlockBtn.disabled = false;
              unlockBtn.onclick = function() {
                part.locked = false;
                render();
              };
            }
          }
        } else if (!part.locked) {
          const partStatus = getPartStatus(part);
          const existingPlayBtn = document.querySelector(`#part-${part.order} .futuristic-btn`);
          if (partStatus === 'complete' && !existingPlayBtn) {
            render();
          } else if (partStatus !== 'complete' && existingPlayBtn) {
            render();
          }
        }
      });
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxOverlay = document.getElementById('lightbox-overlay');
    const scanline = document.getElementById('scanline');
    const lightboxPart = document.getElementById('lightbox-part');
    const lightboxPage = document.getElementById('lightbox-page');
    const lightboxClose = document.querySelector('.lightbox-close');
    const lightboxPrev = document.querySelector('.lightbox-prev');
    const lightboxNext = document.querySelector('.lightbox-next');
    const lightboxFillup = document.getElementById('lightbox-fillup');
    lightboxFillup.className = 'lightbox-fillup futuristic-btn fire';

    let currentPartIndex = 0;
    let currentPageIndex = 0;
    let currentZoom = 1;
    let panX = 0;
    let panY = 0;
    const maxZoom = 2;
    const minZoom = 1;

    function openLightbox(partIndex, pageIndex, direction) {
      currentPartIndex = partIndex;
      currentPageIndex = pageIndex;
      const page = data.parts[partIndex].pages[pageIndex];
      
      let src;
      if (page.completion >= page.cap) {
        if (page.showColor) {
          src = `public/Page${page.order}-full.webp`;
        } else {
          src = `public/Page${page.order}-${page.completion}.webp`;
        }
      } else if (page.completion > 0) {
        src = `public/Page${page.order}-${page.completion}.webp`;
      } else {
        src = `public/Page${page.order}-0.webp`;
      }
      
      // Remove any existing animation classes
      lightboxImg.classList.remove('animating', 'swipe-left-out', 'swipe-left-in', 'swipe-right-out', 'swipe-right-in');
      
      if (direction) {
        // Swipe animation
        lightboxImg.classList.add(`swipe-${direction}-in`);
        lightboxImg.src = src;
        setTimeout(() => {
          lightboxImg.classList.remove(`swipe-${direction}-in`);
        }, 300);
      } else {
        // Initial open - just set src
        lightboxImg.src = src;
        void lightboxImg.offsetWidth;
        lightboxImg.classList.add('animating');
        setTimeout(() => {
          lightboxImg.classList.remove('animating');
        }, 500);
      }
      
      lightboxPart.textContent = '';
      lightboxPage.textContent = `Page ${page.order}`;
      resetZoom();
      updateFillupButton();
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
    }

    function showPrev() {
      const part = data.parts[currentPartIndex];
      currentPageIndex = (currentPageIndex - 1 + part.pages.length) % part.pages.length;
      openLightbox(currentPartIndex, currentPageIndex, 'left');
    }

    function showNext() {
      const part = data.parts[currentPartIndex];
      currentPageIndex = (currentPageIndex + 1) % part.pages.length;
      openLightbox(currentPartIndex, currentPageIndex, 'right');
    }

    function updateFillupButton() {
      const page = data.parts[currentPartIndex].pages[currentPageIndex];
      const current = page.completion;
      const max = page.cap;
      const isComplete = current >= max;

      if (isComplete) {
        if (page.showColor) {
          lightboxFillup.textContent = 'SHOW LINEART';
          lightboxFillup.className = 'lightbox-fillup futuristic-btn fire';
        } else {
          lightboxFillup.textContent = 'SHOW COLOR';
          lightboxFillup.className = 'lightbox-fillup futuristic-btn ice';
        }
      } else {
        lightboxFillup.textContent = 'FILL UP';
        lightboxFillup.className = 'lightbox-fillup futuristic-btn fire';
      }
    }

    function fillUp() {
      const page = data.parts[currentPartIndex].pages[currentPageIndex];
      const current = page.completion;
      const max = page.cap;

      if (current >= max) {
        if (page.showColor) {
          page.showColor = false;
          const newSrc = `public/Page${page.order}-${current}.webp`;
          scanlineTransition(newSrc);
        } else {
          page.showColor = true;
          const newSrc = `public/Page${page.order}-full.webp`;
          scanlineTransition(newSrc);
        }
        updateFillupButton();
        return;
      }

      page.completion++;

      const imgEl = document.getElementById(`page-img-${currentPartIndex}-${currentPageIndex}`);
      const textEl = document.getElementById(`page-text-${currentPartIndex}-${currentPageIndex}`);
      const barEl = imgEl.parentElement.querySelector('.progress-bar');
      const barContainerEl = imgEl.parentElement.querySelector('.progress-bar-container');
      const captionEl = imgEl.parentElement.querySelector('.progress-caption');

      const percent = (page.completion / max) * 100;
      barEl.style.width = `${percent}%`;
      textEl.textContent = `${page.completion}/${max}`;

      if (page.completion > 0) {
        captionEl.classList.add('filled');
      }

      if (page.completion >= max) {
        barEl.classList.add('complete');
        const progressItem = imgEl.closest('.progress-item');
        if (progressItem) {
          progressItem.classList.add('complete');
        }
      }

      if (page.completion >= max) {
        imgEl.src = `public/Page${page.order}-icon-full.webp`;
        const newSrc = `public/Page${page.order}-${page.completion}.webp`;
        scanlineTransition(newSrc);
      } else {
        const newSrc = `public/Page${page.order}-${page.completion}.webp`;
        scanlineTransition(newSrc);
      }

      updateFillupButton();
      checkUnlocks();
    }

    function scanlineTransition(newSrc, callback) {
      // Pre-load the image first
      const img = new Image();
      img.src = newSrc;
      
      img.onload = () => {
        lightboxOverlay.src = newSrc;
        lightboxOverlay.classList.remove('animating');
        scanline.classList.remove('animating');
        
        // Force reflow to restart animation
        void lightboxOverlay.offsetWidth;
        void scanline.offsetWidth;
        
        lightboxOverlay.classList.add('animating');
        scanline.classList.add('animating');
        
        setTimeout(() => {
          lightboxImg.src = newSrc;
          lightboxOverlay.classList.remove('animating');
          scanline.classList.remove('animating');
          lightboxOverlay.src = '';
          if (callback) callback();
        }, 300);
      };
    }

    function updateTransform() {
      lightboxImg.style.transform = `scale(${currentZoom}) translate(${panX}px, ${panY}px)`;
    }

    function resetZoom() {
      currentZoom = 1;
      panX = 0;
      panY = 0;
      lightboxImg.classList.remove('zoomed');
      lightboxFillup.style.display = 'block';
      lightboxPage.style.display = 'block';
      updateTransform();
    }

    document.getElementById('container').addEventListener('click', (e) => {
      const progressItem = e.target.closest('.progress-item');
      if (progressItem) {
        const partIndex = parseInt(progressItem.dataset.partIndex);
        const pageIndex = parseInt(progressItem.dataset.pageIndex);
        openLightbox(partIndex, pageIndex);
      }
    });

    lightboxFillup.addEventListener('click', fillUp);
    lightboxFillup.addEventListener('touchend', (e) => {
      e.preventDefault();
      fillUp();
    });
    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', showPrev);
    lightboxNext.addEventListener('click', showNext);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        resetZoom();
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') {
        resetZoom();
        closeLightbox();
      }
      if (e.key === 'ArrowLeft') {
        resetZoom();
        showPrev();
      }
      if (e.key === 'ArrowRight') {
        resetZoom();
        showNext();
      }
    });

    lightboxImg.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.deltaY < 0) {
        currentZoom = Math.min(currentZoom + 0.2, maxZoom);
      } else {
        currentZoom = Math.max(currentZoom - 0.2, minZoom);
        if (currentZoom === 1) {
          panX = 0;
          panY = 0;
        }
      }
      if (currentZoom > 1) {
        lightboxImg.classList.add('zoomed');
        lightboxFillup.style.display = 'none';
        lightboxPage.style.display = 'none';
      } else {
        lightboxFillup.style.display = 'block';
        lightboxPage.style.display = 'block';
      }
      updateTransform();
    });

    lightboxImg.addEventListener('dblclick', resetZoom);

    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let lastPanX = 0;
    let lastPanY = 0;
    let dragged = false;

    lightbox.addEventListener('mousedown', (e) => {
      if (e.target === lightboxImg && currentZoom > 1) {
        isDragging = true;
        dragged = false;
        startX = e.clientX;
        startY = e.clientY;
        lastPanX = panX;
        lastPanY = panY;
        lightboxImg.style.cursor = 'grabbing';
        e.preventDefault();
      }
    });

    lightbox.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.clientX - startX;
        const deltaY = e.clientY - startY;
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
          dragged = true;
        }
        panX = lastPanX + deltaX / currentZoom;
        panY = lastPanY + deltaY / currentZoom;
        updateTransform();
      }
    });

    lightbox.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        lightboxImg.style.cursor = 'grab';
      }
    });

    let initialPinchDistance = 0;
    let initialScale = 1;
    let lastTouchX = 0;
    let lastTouchY = 0;
    let lastPanTouchX = 0;
    let lastPanTouchY = 0;
    let touchStartTime = 0;
    let touchDragged = false;

    lightbox.addEventListener('touchstart', (e) => {
      touchStartTime = Date.now();
      touchDragged = false;
      if (e.touches.length === 2) {
        initialPinchDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        initialScale = currentZoom;
        lastPanTouchX = panX;
        lastPanTouchY = panY;
      } else if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        lastPanTouchX = panX;
        lastPanTouchY = panY;
      }
    });

    lightbox.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const pinchDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const scale = (pinchDistance / initialPinchDistance) * initialScale;
        currentZoom = Math.max(minZoom, Math.min(scale, maxZoom));
        if (currentZoom > 1) {
          lightboxImg.classList.add('zoomed');
          lightboxFillup.style.display = 'none';
          lightboxPage.style.display = 'none';
        } else {
          panX = 0;
          panY = 0;
          lightboxFillup.style.display = 'block';
          lightboxPage.style.display = 'block';
        }
        updateTransform();
      } else if (e.touches.length === 1 && currentZoom > 1) {
        e.preventDefault();
        const deltaX = e.touches[0].clientX - lastTouchX;
        const deltaY = e.touches[0].clientY - lastTouchY;
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
          touchDragged = true;
        }
        panX = lastPanTouchX + deltaX / currentZoom;
        panY = lastPanTouchY + deltaY / currentZoom;
        updateTransform();
      }
    });

    let lastTapTime = 0;

    lightbox.addEventListener('touchend', (e) => {
      // Don't trigger zoom if touching the button, arrows, or close
      if (e.target === lightboxFillup || 
          e.target === lightboxClose || 
          e.target === lightboxPrev || 
          e.target === lightboxNext ||
          lightboxFillup.contains(e.target)) {
        return;
      }
      
      if (e.changedTouches.length === 1 && currentZoom <= 1) {
        const deltaX = e.changedTouches[0].clientX - lastTouchX;
        const deltaY = e.changedTouches[0].clientY - lastTouchY;
        
        // Swipe detection - horizontal swipe > 50px
        if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY)) {
          resetZoom();
          if (deltaX < 0) {
            // Swipe left - next page
            showNext();
          } else {
            // Swipe right - previous page
            showPrev();
          }
          return;
        }
      }
      
      const touchDuration = Date.now() - touchStartTime;
      if (touchDuration < 300 && !touchDragged && e.changedTouches.length === 1) {
        const now = Date.now();
        if (now - lastTapTime < 300) {
          // Double tap detected
          if (lightboxImg.classList.contains('zoomed')) {
            resetZoom();
          } else {
            lightboxImg.classList.add('zoomed');
            currentZoom = 2;
            lightboxFillup.style.display = 'none';
            lightboxPage.style.display = 'none';
            updateTransform();
          }
        }
        lastTapTime = now;
      }
    });

    render();
  </script>
</body>
</html>
